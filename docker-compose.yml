

services:
  # ────────────────────────────
  # PostgreSQL 16
  # ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: educore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore_dev_password
      POSTGRES_DB: educore_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educore -d educore_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────
  # Redis 7
  # ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: educore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────
  # pgAdmin (opcional, para ver la BD visualmente)
  # ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: educore_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@educore.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools  # Solo se levanta con: docker-compose --profile tools up

volumes:
  postgres_data:
  redis_data:
