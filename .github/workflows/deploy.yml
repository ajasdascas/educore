name: 🚀 Deploy EduCore to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # 3. Install dependencies
    - name: 📦 Install dependencies
      run: |
        cd frontend
        npm ci

    # 4. Build production
    - name: 🏗️ Build for production
      run: |
        cd frontend
        npm run build
        echo "✅ Build completed"
        echo "📁 Static export generated:"
        ls -la out/
        echo "📁 Build size:"
        du -sh out/

    # 5. Test FTP connection first
    - name: 🔍 Test FTP connection
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        timeout 60s lftp -c "set ftp:ssl-allow false; set ftp:ssl-force false; set ssl:verify-certificate false; set net:timeout 15; set net:max-retries 1; open onlineu.mx; user u550473909 ${{ secrets.FTP_PASSWORD }}; ls; quit"

    # 6. Deploy with lftp. We upload the static export directly to the real web root.
    - name: 🚀 Deploy to FTP Server
      run: |
        lftp -c "
          set ftp:ssl-allow false;
          set ftp:ssl-force false;
          set ssl:verify-certificate false;
          set net:timeout 20;
          set net:max-retries 2;
          open onlineu.mx;
          user u550473909 ${{ secrets.FTP_PASSWORD }};
          mirror --reverse --verbose --parallel=4 frontend/out/ /domains/onlineu.mx/public_html/educore/;
          quit
        "

    # 7. Verify deployment
    - name: 🔍 Verify files were uploaded
      run: |
        sudo apt-get install -y lftp
        echo "📋 Checking uploaded files:"
        lftp -c "set ftp:ssl-allow false; set ftp:ssl-force false; set ssl:verify-certificate false; open onlineu.mx; user u550473909 ${{ secrets.FTP_PASSWORD }}; cd /domains/onlineu.mx/public_html/educore/; ls -la; quit"

    # 8. Test website response
    - name: 🌐 Test website
      run: |
        echo "🧪 Testing website response..."
        curl -I https://onlineu.mx/educore/ || echo "Site not responding yet"

    # 9. Notify success
    - name: ✅ Deploy Success
      run: |
        echo "🎉 Deploy completado exitosamente!"
        echo "🌐 URL: https://onlineu.mx/educore/super-admin/dashboard/"
        echo "⏰ Timestamp: $(date)"
