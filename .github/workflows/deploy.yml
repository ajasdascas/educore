name: 🚀 Deploy EduCore to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # 3. Install dependencies
    - name: 📦 Install dependencies
      run: |
        cd frontend
        npm ci

    # 4. Build production
    - name: 🏗️ Build for production
      run: |
        cd frontend
        npm run build

    # 5. Deploy to FTP
    - name: 🚀 Deploy to FTP Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: onlineu.mx
        username: u550473909
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: frontend/.next/
        server-dir: /domains/educore/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/Thumbs.db

    # 6. Notify success
    - name: ✅ Deploy Success
      run: |
        echo "🎉 Deploy completado exitosamente!"
        echo "🌐 URL: https://onlineu.mx/educore/super-admin/dashboard/"