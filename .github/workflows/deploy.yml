name: 🚀 Deploy EduCore to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # 3. Install dependencies
    - name: 📦 Install dependencies
      run: |
        cd frontend
        npm ci

    # 4. Build production
    - name: 🏗️ Build for production
      run: |
        cd frontend
        npm run build
        echo "✅ Build completed"
        ls -la .next/
        echo "📁 Build size:"
        du -sh .next/

    # 5. Test FTP connection first
    - name: 🔍 Test FTP connection
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        lftp -c "open onlineu.mx; user u550473909 ${{ secrets.FTP_PASSWORD }}; ls; quit"

    # 6. Deploy with detailed logging
    - name: 🚀 Deploy to FTP Server (Verbose)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: onlineu.mx
        username: u550473909
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: frontend/.next/
        server-dir: /domains/educore/
        log-level: verbose
        timeout: 60000
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/Thumbs.db

    # 7. Verify deployment
    - name: 🔍 Verify files were uploaded
      run: |
        sudo apt-get install -y lftp
        echo "📋 Checking uploaded files:"
        lftp -c "open onlineu.mx; user u550473909 ${{ secrets.FTP_PASSWORD }}; cd /domains/educore/; ls -la; quit"

    # 8. Test website response
    - name: 🌐 Test website
      run: |
        echo "🧪 Testing website response..."
        curl -I https://onlineu.mx/educore/ || echo "Site not responding yet"

    # 9. Notify success
    - name: ✅ Deploy Success
      run: |
        echo "🎉 Deploy completado exitosamente!"
        echo "🌐 URL: https://onlineu.mx/educore/super-admin/dashboard/"
        echo "⏰ Timestamp: $(date)"